# Server Configuration
server.port=${SERVER_PORT:8081}

# Application Name
spring.application.name=placeflow-backend

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.uktvdyrmnaoaranlklnz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PlaceFlow@8248}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.placeflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Supabase API Configuration
supabase.url=${SUPABASE_URL:https://uktvdyrmnaoaranlklnz.supabase.co}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}
supabase.jwt.secret=${SUPABASE_JWT_SECRET:}
