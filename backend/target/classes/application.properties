# Server Configuration
server.port=${PORT:8081}

# Application Name
spring.application.name=placeflow-backend

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.uktvdyrmnaoaranlklnz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PlaceFlow@8248}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=60000

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate checks schema but does NOT alter it (Flyway owns schema changes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.placeflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Supabase API Configuration
supabase.url=${SUPABASE_URL:https://uktvdyrmnaoaranlklnz.supabase.co}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}
supabase.jwt.secret=${SUPABASE_JWT_SECRET:}

# JWT Configuration
jwt.secret=${JWT_SECRET:PlaceFlow_Ultra_Secret_JWT_Key_2024_MustChange_InProduction_32chars!}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ── Flyway Configuration ─────────────────────────────────────────────────────
# Location of migration scripts
spring.flyway.locations=classpath:db/migration
# IMPORTANT: baseline existing DB so Flyway doesn't fail on already-present tables
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Allow migrations to run out of order if needed
spring.flyway.out-of-order=false
